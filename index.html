function _hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function nailPhotoFor(label = '') {
  const l = (label || '').toLowerCase();
  let bucket = 'art';
  if (/hero|main|key/.test(l)) bucket = 'hero';
  else if (/pink|rose/.test(l)) bucket = 'pink';
  else if (/service|working|technician|staff hand/.test(l)) bucket = 'service';
  else if (/polish|product|bottle|interior|wall|shelf/.test(l)) bucket = 'product';
  else if (/foot|pedi/.test(l)) bucket = 'foot';
  else if (/hand|portrait|finger/.test(l)) bucket = 'hand';
  else if (/pastel|soft|natural/.test(l)) bucket = 'pastel';
  else if (/art|color|design|nuance|gradation/.test(l)) bucket = 'art';
  const arr = NAIL_PHOTOS[bucket] || NAIL_PHOTOS.art;
  const id = arr[_hash(label) % arr.length];
  return NU(id);
}

// ─── NPH: nail placeholder with image fallback ───
function NPH({ label, w, h, ratio, style = {}, src, noPhoto, hue = 340, light = 90 }) {
  const [failed, setFailed] = React.useState(false);
  const photo = src || (noPhoto ? null : nailPhotoFor(label));
  const bg1 = `oklch(${light}% 0.04 ${hue})`;
  const bg2 = `oklch(${light - 4}% 0.04 ${hue})`;
  const wrap = {
    width: w || '100%',
    height: h || (ratio ? undefined : '100%'),
    aspectRatio: ratio,
    position: 'relative',
    overflow: 'hidden',
    background: `repeating-linear-gradient(135deg, ${bg1} 0 18px, ${bg2} 18px 36px)`,
    ...style,
  };
  if (!photo || failed) {
    return (
      <div style={{ ...wrap, display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: `oklch(${light - 35}% 0.06 ${hue})`,
        fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 11, letterSpacing: 0.6,
        textTransform: 'uppercase', textAlign: 'center', padding: 12 }}>
        <span style={{ opacity: 0.8 }}>{label}</span>
      </div>
    );
  }
  return (
    <div style={wrap}>
      <img src={photo} alt={label} onError={() => setFailed(true)}
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
    </div>
  );
}

function nailSmoothScroll(rootEl, id) {
  if (!rootEl) return;

  const top = tgt.getBoundingClientRect().top - rootEl.getBoundingClientRect().top + rootEl.scrollTop - 8;

}

<script type="text/babel" data-presets="env,react">
function ResponsiveDemo() {
  const [w, setW] = React.useState(typeof window !== 'undefined' ? window.innerWidth : 1440);
  const [contentH, setContentH] = React.useState(0);
  const innerRef = React.useRef(null);

  React.useEffect(() => {
    const onResize = () => setW(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const isMobile = w < 800;
  const baseW = isMobile ? 390 : 1440;
  const scale = w / baseW;

  React.useLayoutEffect(() => {
    if (!innerRef.current) return;
    const ro = new ResizeObserver(() => {
      if (innerRef.current) setContentH(innerRef.current.scrollHeight);
    });
    ro.observe(innerRef.current);
    return () => ro.disconnect();
  }, [isMobile]);

  return (
    <div className="demo-stage" style={{ height: contentH * scale || undefined }}>
      <div className="scaler" style={{ width: baseW, transform: 'scale(' + scale + ')' }} ref={innerRef}>
        {isMobile ? <NCMobile /> : <NCDesktop />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ResponsiveDemo />);
</script>
